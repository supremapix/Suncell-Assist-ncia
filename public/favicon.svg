<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient for Phone Body -->
    <linearGradient id="phoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E24" />
      <stop offset="100%" stop-color="#0D0D0D" />
    </linearGradient>
    
    <!-- Sun/Cell Gradient (Vibrant Orange to Gold) -->
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9E00" />
      <stop offset="50%" stop-color="#FF6B00" />
      <stop offset="100%" stop-color="#E05300" />
    </linearGradient>
    
    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer background circle/squircle for nice contrast (ideal for App Icons) -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#FFFFFF" />
  
  <!-- Outer Subtle Shadow/Glow under the brand mark -->
  <rect x="40" y="40" width="432" height="432" rx="96" fill="#F5F5F7" />

  <!-- The Smartphone Silhouette (with high-tech curved bezel) -->
  <rect x="120" y="70" width="272" height="372" rx="44" fill="url(#phoneGrad)" stroke="#E5E7EB" stroke-width="4" />
  
  <!-- Notch/Speaker Speaker Bar -->
  <rect x="216" y="88" width="80" height="8" rx="4" fill="#374151" />

  <!-- Home Indicator Bar at the bottom -->
  <rect x="206" y="420" width="100" height="6" rx="3" fill="#4B5563" />

  <!-- SUNCELL Glowing Brand Mark Inside the Screen -->
  <g transform="translate(256, 246)">
    <!-- Sun Rays/Energy Rays (Minimalist circular arrangements) -->
    <circle cx="0" cy="0" r="88" fill="none" stroke="#FF6B00" stroke-width="2" stroke-dasharray="12 12" opacity="0.3" />
    <circle cx="0" cy="0" r="68" fill="none" stroke="#FF6B00" stroke-width="3" stroke-dasharray="8 8" opacity="0.5" />
    
    <!-- Central Sun Core / Energy Cell shaped like a hexagonal microchip/cell -->
    <polygon points="0,-48 41.5,-24 41.5,24 0,48 -41.5,24 -41.5,-24" fill="url(#sunGrad)" filter="url(#glow)" />
    
    <!-- Inner design of the cell (glowing microchip lines) -->
    <path d="M 0,-40 L 0,40 M -34.6,-20 L 34.6,20 M -34.6,20 L 34.6,-20" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.4" />
    
    <!-- Tech Core Circle -->
    <circle cx="0" cy="0" r="16" fill="#FFFFFF" />
    <circle cx="0" cy="0" r="8" fill="#FF6B00" />
  </g>
  
  <!-- Tech Tool / Screwdriver & Wrench Cross subtle watermark in orange -->
  <!-- Left Side Tool Icon (Wrench) -->
  <path d="M 150,120 L 170,140" stroke="#FF6B00" stroke-width="6" stroke-linecap="round" opacity="0.8" />
  <circle cx="145" cy="115" r="12" fill="none" stroke="#FF6B00" stroke-width="6" opacity="0.8" />
  <path d="M 141,111 L 149,119" stroke="#FF6B00" stroke-width="4" opacity="0.8" />

  <!-- Right Side Tool Icon (Lightning Bolt representing fast electrical repair & solar energy) -->
  <path d="M 350,110 L 335,130 L 350,130 L 340,155 L 365,125 L 350,125 Z" fill="#FF6B00" filter="url(#glow)" />
</svg>
